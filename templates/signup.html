<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            font-family: 'Segoe UI', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center">

<div class="w-full max-w-5xl flex bg-white rounded-2xl shadow-2xl overflow-hidden">

    <!-- LEFT SIDE (BRANDING) -->
    <div class="hidden md:flex w-1/2 bg-gradient-to-br from-indigo-600 to-purple-600 text-white p-10 flex-col justify-center">
        <h1 class="text-4xl font-bold mb-4">Momentum 🚀</h1>
        <p class="text-lg opacity-90">
            Manage your team, track progress, and finish work faster with a clean and powerful task system.
        </p>

        <div class="mt-8 space-y-2 text-sm opacity-80">
            <p>✔ Project Management</p>
            <p>✔ Task Tracking</p>
            <p>✔ Team Collaboration</p>
        </div>
    </div>

    <!-- RIGHT SIDE (FORM) -->
    <div class="w-full md:w-1/2 p-10">

        <h2 class="text-3xl font-bold text-gray-800 mb-2">Create Account</h2>
        <p class="text-gray-500 mb-6">Start managing your tasks today</p>

        <form id="signupForm" class="space-y-4">

            <input id="name" type="text" placeholder="Full Name"
                class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                required>

            <input id="email" type="email" placeholder="Email address"
                class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                required>

            <input id="password" type="password" placeholder="Password"
                class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                required>

            <input id="confirm" type="password" placeholder="Confirm Password"
                class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
                required>

            <button type="submit"
                class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition shadow-lg">
                Create Account →
            </button>

        </form>

        <!-- Footer -->
        <p class="text-center mt-6 text-sm text-gray-600">
            Already have an account?
            <a href="/" class="text-indigo-600 font-semibold hover:underline">Login</a>
        </p>

    </div>

</div>

<!-- JS -->
<script>
document.getElementById("signupForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (password !== confirm) {
        alert("Passwords do not match ❌");
        return;
    }

    try {
        const res = await fetch("/api/register/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: email,
                email: email,
                password: password
            })
        });

        const data = await res.json();

        if (res.status === 201) {
            alert("Signup success ✅");
            window.location.href = "/";
        } else {
            alert(JSON.stringify(data));
        }

    } catch (err) {
        alert("Server error ❌");
    }
});
</script>

</body>
</html>
